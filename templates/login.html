<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Parkir ANPR</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f5f6f8;
            --surface: #ffffff;
            --border: #e4e7ec;
            --text: #111827;
            --text-2: #6b7280;
            --text-3: #9ca3af;
            --blue: #2563eb;
            --blue-bg: #eff6ff;
            --blue-hover: #1d4ed8;
            --green: #16a34a;
            --green-bg: #f0fdf4;
            --red: #dc2626;
            --red-bg: #fef2f2;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .wrapper {
            width: 100%;
            max-width: 400px;
        }

        /* BRAND */
        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 28px;
            text-align: center;
        }

        .logo {
            width: 48px; height: 48px;
            background: var(--blue);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 14px;
        }

        .logo svg { width: 24px; height: 24px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; }

        .brand h1 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        .brand p {
            font-size: 12px;
            color: var(--text-2);
            margin-top: 3px;
        }

        /* CARD */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 28px;
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }

        .card-sub {
            font-size: 12px;
            color: var(--text-2);
            margin-bottom: 24px;
        }

        /* ERROR */
        .alert-error {
            display: flex;
            align-items: center;
            gap: 9px;
            background: var(--red-bg);
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 18px;
            font-size: 12px;
            color: var(--red);
        }

        .alert-error svg { width: 15px; height: 15px; stroke: var(--red); fill: none; stroke-width: 2; flex-shrink: 0; }

        /* FORM */
        .form-group { margin-bottom: 14px; }

        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px 13px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            color: var(--text);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--blue);
            background: var(--surface);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.08);
        }

        input::placeholder { color: var(--text-3); }

        /* PASSWORD WRAPPER */
        .input-wrap { position: relative; }

        .toggle-pw {
            position: absolute;
            right: 12px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            cursor: pointer; padding: 0;
            color: var(--text-3);
            display: flex; align-items: center;
        }

        .toggle-pw svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }
        .toggle-pw:hover { color: var(--text-2); }

        /* SUBMIT */
        .btn {
            width: 100%;
            padding: 11px;
            background: var(--blue);
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s, transform 0.1s;
            letter-spacing: 0.1px;
        }

        .btn:hover { background: var(--blue-hover); }
        .btn:active { transform: scale(0.99); }

        /* DIVIDER */
        .divider {
            display: flex; align-items: center; gap: 10px;
            margin: 20px 0 0;
        }

        .divider hr { flex: 1; border: none; border-top: 1px solid var(--border); }
        .divider span { font-size: 11px; color: var(--text-3); white-space: nowrap; }

        /* FOOTER INFO */
        .info-row {
            margin-top: 14px;
            display: flex; align-items: center; gap: 8px;
            padding: 10px 14px;
            background: var(--blue-bg);
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            font-size: 11px;
            color: #1e40af;
        }

        .info-row svg { width: 14px; height: 14px; stroke: #2563eb; fill: none; stroke-width: 2; flex-shrink: 0; }

        /* STATUS BAR */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 20px;
            font-size: 11px;
            color: var(--text-3);
        }

        .dot-live {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .status-bar span { font-family: 'DM Mono', monospace; color: var(--green); }
    </style>
</head>
<body>
<div class="wrapper">

    <!-- BRAND -->
    <div class="brand">
        <div class="logo">
            <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M5 10h1M18 10h1M6 14h12"/></svg>
        </div>
        <h1>Sistem Parkir ANPR</h1>
        <p>Universitas Harkat Negeri · Gerbang Utama</p>
    </div>

    <!-- CARD -->
    <div class="card">
        <div class="card-title">Masuk ke Dashboard</div>
        <div class="card-sub">Gunakan akun petugas yang telah terdaftar</div>

        <!-- ERROR -->
        {% if error %}
        <div class="alert-error">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            {{ error }}
        </div>
        {% endif %}

        <!-- FORM -->
        <form action="/login" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Masukkan username" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrap">
                    <input type="password" id="password" name="password" placeholder="Masukkan password" required autocomplete="current-password">
                    <button type="button" class="toggle-pw" onclick="togglePw()" title="Tampilkan password">
                        <svg id="eye-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn">Masuk</button>
        </form>

        <div class="divider">
            <hr>
            <span>informasi sistem</span>
            <hr>
        </div>

        <div class="info-row">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            Hubungi administrator jika lupa kredensial akun Anda
        </div>
    </div>

    <!-- STATUS -->
    <div class="status-bar">
        <div class="dot-live"></div>
        Sistem aktif &nbsp;·&nbsp; ANPR v3.2.1 &nbsp;·&nbsp;
        <span id="clock">--:--:--</span>
    </div>

</div>

<script>
    function pad(n) { return n < 10 ? '0' + n : n; }
    function tick() {
        const now = new Date();
        document.getElementById('clock').textContent =
            pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
    }
    setInterval(tick, 1000);
    tick();

    function togglePw() {
        const pw = document.getElementById('password');
        const icon = document.getElementById('eye-icon');
        if (pw.type === 'password') {
            pw.type = 'text';
            icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
        } else {
            pw.type = 'password';
            icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
        }
    }
</script>
</body>
</html>
